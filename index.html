<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 9 Math EQAO Mock Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Use native MathJax CDN with explicit configuration -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div id="app" class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-3xl font-bold mb-6 text-center text-blue-800">Grade 9 EQAO Math Mock Exam</h1>
        
        <div id="setup-screen" class="space-y-4">
            <p class="text-lg">Select your practice mode:</p>
            <button onclick="startExam('assisted')" class="w-full p-4 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Assisted (Step-by-Step Learning)</button>
            <button onclick="startExam('somewhat')" class="w-full p-4 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600">Somewhat Assisted (Cheat Sheet & Feedback)</button>
            <button onclick="startExam('unassisted')" class="w-full p-4 bg-green-600 text-white rounded-lg hover:bg-green-700">Unassisted (Full Exam Simulation)</button>
        </div>

        <div id="exam-screen" class="hidden space-y-6">
            <div class="flex justify-between items-center bg-gray-100 p-4 rounded">
                <span id="timer" class="font-mono text-xl">Time: 90:00</span>
                <span id="progress">Question 1/20</span>
            </div>
            <div id="question-container" class="space-y-4"></div>
            <div id="feedback-area" class="mt-4 p-4 rounded hidden"></div>
        </div>

        <div id="report-screen" class="hidden space-y-4">
            <h2 class="text-2xl font-bold">Exam Report</h2>
            <div id="stats" class="grid grid-cols-2 gap-4"></div>
            <button onclick="location.reload()" class="w-full p-3 bg-gray-800 text-white rounded">Retake Exam</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Solve for x: $2x + 5 = 15$", options: ["x = 5", "x = 7", "x = 10", "x = 2"], correct: 0, topic: "Algebra" },
            { q: "Evaluate: $3^2 + 4^2$", options: ["14", "25", "49", "7"], correct: 1, topic: "Exponents" },
            { q: "What is the slope of the line $y = 3x - 4$?", options: ["-4", "1", "3", "3x"], correct: 2, topic: "Linear Relations" },
            { q: "Simplify: $x^3 \\cdot x^2$", options: ["x^6", "x^5", "x^1", "2x^5"], correct: 1, topic: "Exponents" },
            { q: "Area of a circle with radius $r = 3$ is?", options: ["6\\pi", "9\\pi", "3\\pi", "12\\pi"], correct: 1, topic: "Geometry" }
            // Add more up to 20 as needed
        ];

        let state = { mode: '', currentQ: 0, score: 0, time: 5400, results: [] };

        function startExam(mode) {
            state.mode = mode;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('exam-screen').classList.remove('hidden');
            renderQuestion();
            setInterval(() => {
                state.time--;
                document.getElementById('timer').innerText = `Time: ${Math.floor(state.time/60)}:${state.time%60}`;
            }, 1000);
        }

        function renderQuestion() {
            const q = questions[state.currentQ];
            const container = document.getElementById('question-container');
            container.innerHTML = `
                <h3 class="text-xl font-medium">${q.q}</h3>
                <div class="grid gap-2">
                    ${q.options.map((opt, i) => `
                        <button onclick="checkAnswer(${i})" class="p-3 border rounded hover:bg-blue-50 text-left">${opt}</button>
                    `).join('')}
                </div>
            `;
            // Trigger MathJax to re-render after dynamic content update
            if (window.MathJax) MathJax.typesetPromise();
        }

        function checkAnswer(idx) {
            const q = questions[state.currentQ];
            const isCorrect = idx === q.correct;
            if (isCorrect) state.score++;
            
            if (state.mode === 'assisted') {
                alert(isCorrect ? "Correct! Well done." : "Not quite. Think about performing the same operation on both sides.");
            } else if (state.mode === 'somewhat' && !isCorrect) {
                alert("Incorrect. Try again using the provided cheat sheet logic.");
            }

            state.currentQ++;
            if (state.currentQ < questions.length) renderQuestion();
            else showReport();
        }

        function showReport() {
            document.getElementById('exam-screen').classList.add('hidden');
            document.getElementById('report-screen').classList.remove('hidden');
            document.getElementById('stats').innerHTML = `<p>Score: ${state.score}/${questions.length}</p>`;
        }
    </script>
</body>
</html>
