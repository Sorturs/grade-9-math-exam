<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 9 EQAO Math Mock Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']], processEscapes: true },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div id="app" class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow-lg border border-gray-200">
        <h1 class="text-3xl font-bold mb-6 text-center text-blue-800">Grade 9 EQAO Math Mock Exam</h1>
        
        <div id="setup-screen" class="space-y-4">
            <p class="text-center text-gray-600">30 Questions â€˘ Algebra, Geometry, Linear Relations, & Data.</p>
            <button onclick="startExam('assisted')" class="w-full p-4 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700">Assisted Mode (Hints)</button>
            <button onclick="startExam('unassisted')" class="w-full p-4 bg-green-600 text-white font-semibold rounded-lg hover:bg-green-700">Unassisted Mode (Simulation)</button>
        </div>

        <div id="exam-screen" class="hidden space-y-6">
            <div id="progress-bar" class="text-sm text-gray-500 font-mono"></div>
            <div id="question-container" class="space-y-4 p-4 border-b border-gray-100"></div>
            <div id="feedback" class="p-4 rounded-lg bg-blue-50 text-blue-800 hidden font-medium"></div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Solve for $x$: $2x + 5 = 15$", options: ["$x=5$", "$x=7$", "$x=10$", "$x=2$"], correct: 0 },
            { q: "Evaluate $3^2 + 4^2$", options: ["$14$", "$25$", "$49$", "$7$"], correct: 1 },
            { q: "Calculate $13\\%$ tax on $50", options: ["$5.00$", "$6.50$", "$65.00$", "$1.30$"], correct: 1 },
            { q: "Simplify $x^3 \\cdot x^2$", options: ["$x^6$", "$x^5$", "$x^1$", "$2x^5$"], correct: 1 },
            { q: "Slope of $y = 3x - 4$?", options: ["$-4$", "$1$", "$3$", "$3x$"], correct: 2 },
            { q: "Solve $4x - 8 = 12$", options: ["$x=5$", "$x=4$", "$x=1$", "$x=2$"], correct: 0 },
            { q: "Value of $2^3 + 2^2$", options: ["$12$", "$8$", "$16$", "$10$"], correct: 0 },
            { q: "Area of rectangle length 5, width 4?", options: ["$18$", "$20$", "$9$", "$25$"], correct: 1 },
            { q: "Perimeter of square side 6?", options: ["$36$", "$12$", "$24$", "$30$"], correct: 2 },
            { q: "Simplify $(x^2)^3$", options: ["$x^5$", "$x^6$", "$x^8$", "$2x^3$"], correct: 1 },
            { q: "If $2x = 10$, then $x+3$ is?", options: ["$5$", "$8$", "$13$", "$7$"], correct: 1 },
            { q: "Convert $0.25$ to percentage?", options: ["$2.5\\%$", "$25\\%$", "$0.25\\%$", "$250\\%$"], correct: 1 },
            { q: "Solve for $x$: $x/2 = 4$", options: ["$2$", "$6$", "$8$", "$4$"], correct: 2 },
            { q: "Simplify $5x + 3x - 2x$", options: ["$6x$", "$10x$", "$4x$", "$5x$"], correct: 0 },
            { q: "What is $\\sqrt{16}$?", options: ["$2$", "$8$", "$4$", "$16$"], correct: 2 },
            { q: "Interior angles of a triangle sum to?", options: ["$90^\\circ$", "$180^\\circ$", "$360^\\circ$", "$270^\\circ$"], correct: 1 },
            { q: "Slope of horizontal line is?", options: ["$1$", "$0$", "undefined", "$-1$"], correct: 1 },
            { q: "Simplify $3(x+2)$?", options: ["$3x+2$", "$3x+6$", "$3x+5$", "$x+5$"], correct: 1 },
            { q: "Solve $x+7=10$", options: ["$3$", "$17$", "$1$", "$7$"], correct: 0 },
            { q: "Which is a linear relation?", options: ["$y=x^2$", "$y=2x+1$", "$y=1/x$", "$y=2^x$"], correct: 1 },
            { q: "Volume of cube side 3?", options: ["$9$", "$6$", "$27$", "$18$"], correct: 2 },
            { q: "Simplify $10^0$", options: ["$0$", "$10$", "$1$", "undefined"], correct: 2 },
            { q: "Solve $3x=12$", options: ["$9$", "$4$", "$6$", "$36$"], correct: 1 },
            { q: "Probability of rolling a 2 on a die?", options: ["$1/2$", "$1/6$", "$2/6$", "$1$"], correct: 1 },
            { q: "Mean of 2, 4, 6?", options: ["$2$", "$4$", "$6$", "$12$"], correct: 1 },
            { q: "Simplify $x^5/x^2$", options: ["$x^7$", "$x^3$", "$x^{2.5}$", "$x^{10}$"], correct: 1 },
            { q: "If $y=x+5$, find $y$ when $x=2$", options: ["$5$", "$2$", "$7$", "$10$"], correct: 2 },
            { q: "Solve $2x-1=9$", options: ["$5$", "$4$", "$10$", "$8$"], correct: 0 },
            { q: "What is $50\\%$ of $80$?", options: ["$40$", "$30$", "$50$", "$20$"], correct: 0 },
            { q: "Sum of angles in a quadrilateral?", options: ["$180^\\circ$", "$360^\\circ$", "$540^\\circ$", "$90^\\circ$"], correct: 1 }
        ];

        let state = { currentQ: 0, mode: '', score: 0 };

        function startExam(mode) {
            state.mode = mode; state.currentQ = 0; state.score = 0;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('exam-screen').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            if (state.currentQ >= questions.length) { finishExam(); return; }
            const q = questions[state.currentQ];
            document.getElementById('progress-bar').innerText = `Question ${state.currentQ + 1} of 30`;
            const container = document.getElementById('question-container');
            container.innerHTML = `<h3 class="text-xl font-medium">${q.q}</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-4">
                    ${q.options.map((opt, i) => `<button onclick="handleAnswer(${i})" class="p-4 border rounded hover:bg-blue-50">${opt}</button>`).join('')}
                </div>`;
            if (window.MathJax) MathJax.typesetPromise([container]);
        }

        function handleAnswer(idx) {
            if (idx === questions[state.currentQ].correct) state.score++;
            if (state.mode === 'assisted') {
                const f = document.getElementById('feedback');
                f.classList.remove('hidden');
                f.innerText = idx === questions[state.currentQ].correct ? "Correct!" : "Try again: Isolate the variable.";
            }
            state.currentQ++;
            renderQuestion();
        }

        function finishExam() {
            document.getElementById('exam-screen').innerHTML = `<div class="text-center p-10"><h2 class="text-2xl font-bold">Exam Finished</h2><p class="text-lg">Score: ${state.score}/30</p><button onclick="location.reload()" class="mt-4 p-3 bg-gray-800 text-white rounded">Retry</button></div>`;
        }
    </script>
</body>
</html>
